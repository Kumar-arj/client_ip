name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install linting tools
        run: |
          pip install flake8
      
      - name: Run flake8
        run: |
          flake8 app/ tests/ --max-line-length=120 --count --show-source --statistics
        continue-on-error: false

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short --cov=app --cov-report=xml
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=${{ github.sha }}
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    name: Image Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image ref
        id: image_ref
        run: |
          echo "value=$(echo '${{ env.REGISTRY }}/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')@${{ needs.build.outputs.digest }}" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image_ref.outputs.value }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Fail on critical/high vulnerabilities
        run: |
          echo "⚠️ Image scan completed. Check Security tab for details."

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.12.0'
      
      - name: Run helm lint
        run: |
          helm lint charts/ip-app/ --strict

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [helm-lint, scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.12.0'

      - name: Create kind cluster
        uses: helm/kind-action@v1.7.0
        with:
          cluster_name: staging

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and load image into kind
        run: |
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker pull "${IMAGE}:${{ github.sha }}"
          kind load docker-image "${IMAGE}:${{ github.sha }}" --name staging

      - name: Create staging namespace
        run: |
          kubectl create namespace staging || true

      - name: Deploy with Helm
        run: |
          helm upgrade --install ip-app charts/ip-app/ \
            --namespace staging \
            --values charts/ip-app/values.yaml \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --set image.pullPolicy=Never \
            --wait \
            --timeout 5m
      
      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/ip-app -n staging --timeout=5m

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Port forward and test
        run: |
          # Port forward in background
          kubectl port-forward svc/ip-app 8080:80 -n staging &
          sleep 2
          
          # Run smoke tests
          echo "Testing /health endpoint..."
          curl -f http://localhost:8080/health || exit 1
          
          echo "Testing /ready endpoint..."
          curl -f http://localhost:8080/ready || exit 1
          
          echo "Testing / endpoint..."
          curl -f http://localhost:8080/ || exit 1
          
          echo "✅ All smoke tests passed!"

  notify:
    name: Notify on Result
    runs-on: ubuntu-latest
    needs: [lint, test, build, scan, helm-lint]
    if: always()
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \\
             [[ "${{ needs.test.result }}" == "failure" ]] || \\
             [[ "${{ needs.build.result }}" == "failure" ]] || \\
             [[ "${{ needs.scan.result }}" == "failure" ]] || \\
             [[ "${{ needs.helm-lint.result }}" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          fi
      
      - name: GitHub Status Check
        run: |
          echo "${{ steps.status.outputs.emoji }} CI Pipeline: ${{ steps.status.outputs.status }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
      
