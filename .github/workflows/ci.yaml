name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Lint Python
        uses: ./.github/actions/lint-python

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Test Python
        uses: ./.github/actions/test-python

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=${{ github.sha }}
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    name: Image Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image ref
        id: image_ref
        uses: ./.github/actions/set-image-ref
        with:
          registry: ${{ env.REGISTRY }}
          repository: ${{ github.repository }}
          digest: ${{ needs.build.outputs.digest }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image_ref.outputs.value }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Scan report
        uses: ./.github/actions/scan-report

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    needs: [build, scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.12.0'

      - name: Helm lint
        uses: ./.github/actions/helm-lint

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [helm-lint, scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.12.0'

      - name: Create kind cluster
        uses: helm/kind-action@v1.7.0
        with:
          cluster_name: staging

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and load image into kind
        uses: ./.github/actions/load-image-kind
        with:
          registry: ${{ env.REGISTRY }}
          repository: ${{ github.repository }}
          tag: ${{ github.sha }}
          cluster-name: staging

      - name: Create staging namespace
        uses: ./.github/actions/create-namespace
        with:
          namespace: staging

      - name: Deploy with Helm
        uses: ./.github/actions/helm-deploy
        with:
          registry: ${{ env.REGISTRY }}
          repository: ${{ github.repository }}
          tag: ${{ github.sha }}
          namespace: staging

      - name: Debug pod status on failure
        if: failure()
        uses: ./.github/actions/debug-pods
        with:
          namespace: staging

      - name: Wait for deployment
        uses: ./.github/actions/wait-rollout
        with:
          deployment: ip-app
          namespace: staging

      - name: Smoke tests
        uses: ./.github/actions/smoke-tests
        with:
          namespace: staging
          service: ip-app

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Smoke tests run in deploy job
        run: echo "Smoke tests were executed in the deploy job alongside the kind cluster."

  notify:
    name: Notify on Result
    runs-on: ubuntu-latest
    needs: [lint, test, build, scan, helm-lint, deploy]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Notify status
        uses: ./.github/actions/notify-status
        with:
          lint-result: ${{ needs.lint.result }}
          test-result: ${{ needs.test.result }}
          build-result: ${{ needs.build.result }}
          scan-result: ${{ needs.scan.result }}
          helm-lint-result: ${{ needs.helm-lint.result }}
          sha: ${{ github.sha }}
          ref-name: ${{ github.ref_name }}
